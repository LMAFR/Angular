<div class="row">
    <div class="col-xs-12 col-md-6 col-md-offset-3">
        <form action="" #authForm="ngForm" (ngSubmit)="onSubmit(authForm)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="type" id="email" class="form-control" name="email" ngModel email required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" name="password" ngModel minlength="6" required>
            </div>
            <div>
                <button class="btn btn-primary" style="margin-right: 10px;" type="submit" [disabled]="!authForm.valid">
                    {{isLoginMode ? 'Log In' : 'Sign Up'}}
                </button>
                <button class="btn btn-primary" (click)="onSwitchMode()" type="button">Switch to {{isLoginMode ? 'Sign Up' : 'Log In'}}</button>
            </div>
        </form>
    </div>
</div>
